version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"

  # Maintain dependencies for Go (api-gateway)
  - package-ecosystem: "gomod"
    directory: "/api-gateway"
    schedule:
      interval: "weekly"
      day: "saturday"

  # Maintain dependencies for Go (runner-service)
  - package-ecosystem: "gomod"
    directory: "/runner-service"
    schedule:
      interval: "weekly"
      day: "saturday"

  # Maintain dependencies for Go (shared)
  - package-ecosystem: "gomod"
    directory: "/shared"
    schedule:
      interval: "weekly"
      day: "saturday"

  # Maintain dependencies for npm (ui)
  - package-ecosystem: "npm"
    directory: "/ui"
    schedule:
      interval: "weekly"
      day: "saturday"

  # Maintain dependencies for Python (ai-service)
  - package-ecosystem: "pip"
    directory: "/ai-service"
    schedule:
      interval: "weekly"
      day: "saturday"

  # Maintain dependencies for Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"

  - package-ecosystem: "docker"
    directory: "/api-gateway"
    schedule:
      interval: "weekly"
      day: "saturday"

  - package-ecosystem: "docker"
    directory: "/runner-service"
    schedule:
      interval: "weekly"
      day: "saturday"

  - package-ecosystem: "docker"
    directory: "/ai-service"
    schedule:
      interval: "weekly"
      day: "saturday"

  - package-ecosystem: "docker"
    directory: "/ui"
    schedule:
      interval: "weekly"
      day: "saturday"
